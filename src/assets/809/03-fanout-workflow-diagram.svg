<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 270" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <style>
      .executor { fill: #e8f0fe; stroke: #4285f4; stroke-width: 1.5; rx: 8; }
      .ai-agent { fill: #e6f4ea; stroke: #34a853; stroke-width: 1.5; rx: 8; }
      .label { text-anchor: middle; dominant-baseline: central; fill: #222; }
      .sublabel { text-anchor: middle; dominant-baseline: central; fill: #666; font-size: 10px; font-style: italic; }
      .edge { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <!-- Row 1: ParseQuestion -->
  <rect class="executor" x="275" y="20" width="170" height="44"/>
  <text class="label" x="360" y="38">ParseQuestion</text>
  <text class="sublabel" x="360" y="52">Executor</text>

  <!-- Fan-out arrows -->
  <line class="edge" x1="310" y1="64" x2="170" y2="92"/>
  <line class="edge" x1="410" y1="64" x2="550" y2="92"/>

  <!-- Row 2 Left: Physicist -->
  <rect class="ai-agent" x="75" y="94" width="170" height="44"/>
  <text class="label" x="160" y="112">Physicist</text>
  <text class="sublabel" x="160" y="126">AI Agent</text>

  <!-- Row 2 Right: Chemist -->
  <rect class="ai-agent" x="475" y="94" width="170" height="44"/>
  <text class="label" x="560" y="112">Chemist</text>
  <text class="sublabel" x="560" y="126">AI Agent</text>

  <!-- Parallel label -->
  <text x="360" y="116" text-anchor="middle" fill="#888" font-size="11">parallel</text>

  <!-- Fan-in arrows -->
  <line class="edge" x1="170" y1="138" x2="310" y2="166"/>
  <line class="edge" x1="550" y1="138" x2="410" y2="166"/>

  <!-- Row 3: Aggregator -->
  <rect class="executor" x="275" y="168" width="170" height="44"/>
  <text class="label" x="360" y="186">Aggregator</text>
  <text class="sublabel" x="360" y="200">Executor</text>
</svg>
